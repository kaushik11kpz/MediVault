<div class="card">

    <h2>Add Medicine</h2>

    <form
        [formGroup]="medicineForm"
        (ngSubmit)="onSubmit()">

        <div class="form-grid">

            <div>

                <label>Medicine Name</label>

                <input
                    type="text"
                    formControlName="fullName">

            </div>

            <div>

                <label>Brand</label>

                <input
                    type="text"
                    formControlName="brand">

            </div>

            <div>

                <label>Price</label>

                <input
                    type="number"
                    formControlName="price">

            </div>

            <div>

                <label>Quantity</label>

                <input
                    type="number"
                    formControlName="quantity">

            </div>

            <div>

                <label>Expiry Date</label>

                <input
                    type="date"
                    formControlName="expiryDate">

            </div>

        </div>

        <div>

            <label>Notes</label>

            <textarea
                rows="4"
                formControlName="notes">
            </textarea>

        </div>

        <button type="submit">

            Add Medicine

        </button>

    </form>

</div>
